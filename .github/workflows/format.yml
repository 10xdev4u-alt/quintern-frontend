name: Format Check

on:
  push:
    branches:
      - main
      - 'feature/*'
      - 'release/*'
  pull_request:
    branches:
      - main
      - 'release/*'

jobs:
  format:
    name: Prettier Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Run Prettier check
        env:
          CI: true
        run: |
          set -o pipefail
          npx --yes prettier@3 --check . > prettier.log 2>&1 || {
            echo "::group::Prettier output (first 80 lines)"
            head -80 prettier.log || true
            echo "::endgroup::"
            echo "::error::Prettier found unformatted files. Run 'npx prettier --write .' locally and push again."
            exit 1
          }
